<div class="card">
  <div class="card-body">
    <form #studentForm="ngForm" (ngSubmit)="onAddStudent()">
      <div class="form-group">
        <label for="fname">First Name</label>
        <input
          required
          ngModel
          name="fname"
          #fname="ngModel"
          type="text"
          class="form-control"

        />
      </div>

      <div class="form-group">
        <label for="lname">Last Name</label>
        <input
          name="lname"
          ngModel
          required
          #lname="ngModel"
          type="text"
          class="form-control"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          ngModel
          required
          name="email"
          #email="ngModel"
          type="text"
          class="form-control"
          pattern="[a-zA-Z0-9.-_]{1,}@[a-zA-Z.-]{2,}[.]{1}[a-zA-Z]{2,}"
        />
      </div>
      <ng-container *ngIf="email.touched && email.dirty">
        <strong class="text-danger" *ngIf="email.hasError('pattern')"
          >Please Enter Valid Eamil....</strong
        >
      </ng-container>
      <div class="form-group">
        <label for="isActive">isActive</label>
        <select
          ngModel
          required
          name="isActive"
          #isActive="ngModel"
          class="form-control"
        >
          <option value="" disabled selected>Select Status</option>
          <option [ngValue]="true">Yes</option>
          <option [ngValue]="false">No</option>
        </select>
      </div>
      <button
        *ngIf="!isInEditMode"
        type="submit"
        mat-raised-button
        color="primary"
        class="w-100"
      >
        Add Student
      </button>
      <button
        *ngIf="isInEditMode"
        type="button"
        mat-raised-button
        color="accent"
        class="w-100"
        (click)="onUpdate()"
      >
        Update Student
      </button>
    </form>
  </div>
</div>
